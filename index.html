<!DOCTYPE html><html dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام البطاقات</title>
<style>
body{background:#111;color:#fff;text-align:center;font-family:Arial}
input,button{padding:10px;margin:10px;border-radius:8px}
button{background:#00c853;color:#fff;border:none}
</style>
</head><body><h1>💳 نظام البطاقات</h1><input id="card" placeholder="ادخل كود البطاقة"><br>

<button onclick="redeem()">استبدال</button>
<button onclick="status()">حالة</button>
<button onclick="transactions()">العمليات</button>

<h3>النتيجة:</h3>
<pre id="result"></pre><script>
const API = "https://2269.up.railway.app";

async function redeem(){
  let card = document.getElementById('card').value;
  let res = await fetch(API + '/redeem',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({card_key:card})
  });
  let d = await res.json();
  document.getElementById('result').innerText = JSON.stringify(d,null,2);
}

async function status(){
  let card = document.getElementById('card').value;
  let res = await fetch(API + '/status',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({card_key:card})
  });
  let d = await res.json();
  document.getElementById('result').innerText = JSON.stringify(d,null,2);
}

async function transactions(){
  let card = document.getElementById('card').value;
  let res = await fetch(API + '/transactions',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({card_key:card})
  });
  let d = await res.json();
  document.getElementById('result').innerText = JSON.stringify(d,null,2);
}
</script></body>
</html>
