<!DOCTYPE html><html dir="rtl">
<head>
<meta charset="UTF-8">
<title>استبدال بطاقة</title>
<style>
body {font-family: Arial; text-align:center; background:#111; color:#fff;}
input, button {padding:10px; margin:10px; border-radius:8px;}
button {background:#00c853; color:#fff; border:none;}
</style>
</head><body><h1>💳 استبدال بطاقة</h1><input id="card" placeholder="ادخل كود البطاقة">
<br>
<button onclick="redeem()">استبدال</button><h3>النتيجة:</h3>
<pre id="result"></pre><script>
async function redeem() {
  let card = document.getElementById('card').value;

  let res = await fetch('https://2269.up.railway.app/redeem', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ card_key: card })
  });

  let data = await res.json();

  if(data.code === 1){
    document.getElementById('result').innerText =
      "✅ رقم البطاقة: " + data.data.card_number + "\n" +
      "🔐 CVV: " + data.data.cvv + "\n" +
      "📅 الانتهاء: " + data.data.exp;
  } else {
    document.getElementById('result').innerText = "❌ " + data.msg;
  }
}
</script></body>
</html>
